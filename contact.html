<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact · Ryan Ho</title>
<link rel="icon" href="index_files/favicon.png">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
  main { justify-content: flex-start; padding-top: 3.5rem; }

  .page-header {
    margin-bottom: 2.5rem;
    padding-bottom: 1.5rem;
    border-bottom: 2px solid var(--ink);
  }

  .page-header h1 {
    font-family: var(--serif);
    font-size: 2.5rem;
    font-weight: 400;
    margin-bottom: 0.35rem;
  }

  .page-header p {
    font-size: 0.75rem;
    color: var(--muted);
    letter-spacing: 0.08em;
  }
</style>
</head>
<body>

<nav>
  <a class="nav-logo" href="/">
    <img src="index_files/rh_studios.png" alt="Ryan Ho">
    <span>Ryan Ho</span>
  </a>
  <ul class="nav-links">
    <li><a href="/">Home</a></li>
    <li><a href="blog.html">Blog</a></li>
    <li><a href="contact.html" class="active">Contact</a></li>
  </ul>
</nav>

<main>
  <div class="page">
    <div class="page-header">
      <h1>Contact</h1>
      <p>Send me a message and I'll get back to you.</p>
    </div>

    <div class="card">
      <form id="contact-form" action="https://formspree.io/f/xyklejqy" method="POST">
        <div class="form-group">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" placeholder="Your name" required>
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label for="message">Message</label>
          <textarea id="message" name="message" placeholder="What's on your mind?" required></textarea>
        </div>
        <button type="submit" class="btn" id="submit-btn">Send message</button>
      </form>
    </div>
  </div>
</main>

<footer>© Ryan Ho™ <span id="yr"></span> · All rights reserved</footer>
<div class="toast" id="toast"></div>

<script>
document.getElementById('yr').textContent = new Date().getFullYear();

var form = document.getElementById('contact-form');
var btn  = document.getElementById('submit-btn');

form.addEventListener('submit', function(e) {
  e.preventDefault();
  btn.disabled = true;
  btn.textContent = 'Sending…';

  fetch(form.action, {
    method: 'POST',
    body: new FormData(form),
    headers: { 'Accept': 'application/json' }
  })
  .then(function(res) {
    if (res.ok) {
      showToast('Message sent!');
      form.reset();
    } else {
      showToast('Something went wrong — try again.');
    }
  })
  .catch(function() {
    showToast('Network error — try again.');
  })
  .finally(function() {
    btn.disabled = false;
    btn.textContent = 'Send message';
  });
});

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 2500);
}
</script>
</body>
</html>
