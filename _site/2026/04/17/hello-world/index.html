<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>hello world · Ryan Ho</title>
<link rel="icon" href="/index_files/favicon.png">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Noto+Serif+TC:wght@400;600&family=Noto+Serif+KR:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/style.css">
</head>
<body>

<nav>
  <a class="nav-logo" href="/">
    <img src="/index_files/rh_studios.png" alt="Ryan Ho">
    <span>Ryan Ho</span>
  </a>
  <ul class="nav-links">
    <li><a href="/" >Home</a></li>
    <li><a href="/blog/" >Blog</a></li>
    <li><a href="/contact/" >Contact</a></li>
  </ul>
</nav>

<style>
  main { justify-content: flex-start; padding-top: 3.5rem; }

  .post-header {
    margin-bottom: 2.5rem;
    padding-bottom: 1.5rem;
    border-bottom: 2px solid var(--ink);
  }

  .post-header h1 {
    font-family: var(--mono);
    font-size: 2rem;
    font-weight: 500;
    margin-bottom: 0.5rem;
  }

  .post-meta {
    font-size: 0.72rem;
    color: var(--muted);
    letter-spacing: 0.08em;
  }

  .post-body {
    font-size: 0.9rem;
    line-height: 1.9;
    color: var(--ink);
    max-width: 600px;
  }

  .post-body h2 {
    font-family: var(--mono);
    font-size: 1.1rem;
    font-weight: 500;
    margin: 2rem 0 0.75rem;
  }

  .post-body p { margin-bottom: 1rem; }
  .post-body p:last-child { margin-bottom: 0; }

  .post-body a { color: var(--ink); text-underline-offset: 3px; }
  .post-body a:hover { color: var(--muted); }

  .post-body code {
    font-family: var(--mono);
    font-size: 0.85em;
    background: var(--paper-dark);
    padding: 1px 5px;
    border-radius: 3px;
  }

  .post-body pre {
    background: var(--ink);
    color: var(--paper);
    border-radius: 6px;
    padding: 1.25rem;
    overflow-x: auto;
    margin: 1.25rem 0;
  }

  .post-body pre code {
    background: none;
    padding: 0;
    font-size: 0.82rem;
    line-height: 1.7;
  }

  .post-body blockquote {
    border-left: 2px solid var(--ink);
    margin: 1.25rem 0;
    padding: 0.25rem 0 0.25rem 1rem;
    color: var(--muted);
  }

  .back-link {
    display: inline-flex;
    align-items: center;
    gap: 0.35rem;
    font-size: 0.75rem;
    color: var(--muted);
    text-decoration: none;
    letter-spacing: 0.06em;
    margin-bottom: 2rem;
    transition: color 0.15s;
  }
  .back-link:hover { color: var(--ink); }
</style>

<main style="display:block; padding: 0 2rem 4rem; max-width: 780px; margin: 0 auto; width: 100%;">
  <a class="back-link" href="/blog/">← blog</a>
  <article>
    <div class="post-header">
      <h1>hello world</h1>
      <p class="post-meta">April 17, 2026 · 23:38</p>
    </div>
    <div class="post-body">
      <p>so excited to have my first post here! can’t wait to share more in the future. :)</p>

    </div>
  </article>
</main>


<footer>© Ryan Ho™ <span id="yr"></span> · All rights reserved</footer>
<script>document.getElementById('yr').textContent = new Date().getFullYear();</script>

</body>
</html>
