<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact · Ryan Ho</title>
<link rel="icon" href="/index_files/favicon.png">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Noto+Serif+TC:wght@400;600&family=Noto+Serif+KR:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/style.css">
</head>
<body>

<nav>
  <a class="nav-logo" href="/">
    <img src="/index_files/rh_studios.png" alt="Ryan Ho">
    <span>Ryan Ho</span>
  </a>
  <ul class="nav-links">
    <li><a href="/" >Home</a></li>
    <li><a href="/blog/" >Blog</a></li>
    <li><a href="/contact/" class="active">Contact</a></li>
  </ul>
</nav>

<style>
  main { justify-content: flex-start; padding-top: 3.5rem; }

  .page-header {
    margin-bottom: 2.5rem;
    padding-bottom: 1.5rem;
    border-bottom: 2px solid var(--ink);
  }

  .page-header h1 {
    font-family: var(--mono);
    font-size: 2.5rem;
    font-weight: 500;
    margin-bottom: 0.35rem;
  }

  .page-header p {
    font-size: 0.75rem;
    color: var(--muted);
    letter-spacing: 0.08em;
  }
</style>

<main style="display:block; padding: 0 2rem 4rem; max-width: 780px; margin: 0 auto; width: 100%;">
  <div class="page-header">
    <h1>contact</h1>
    <p>send me a message and i'll get back to you.</p>
  </div>

  <div class="card">
    <form id="contact-form" action="https://formspree.io/f/xyklejqy" method="POST">
      <div class="form-group">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" placeholder="Your name" required>
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <label for="message">Message</label>
        <textarea id="message" name="message" placeholder="What's on your mind?" required></textarea>
      </div>
      <button type="submit" class="btn" id="submit-btn">send message</button>
    </form>
  </div>
</main>

<div class="toast" id="toast"></div>

<script>
var form = document.getElementById('contact-form');
var btn  = document.getElementById('submit-btn');

form.addEventListener('submit', function(e) {
  e.preventDefault();
  btn.disabled = true;
  btn.textContent = 'sending…';

  fetch(form.action, {
    method: 'POST',
    body: new FormData(form),
    headers: { 'Accept': 'application/json' }
  })
  .then(function(res) {
    if (res.ok) {
      showToast('message sent!');
      form.reset();
    } else {
      showToast('something went wrong — try again.');
    }
  })
  .catch(function() {
    showToast('network error — try again.');
  })
  .finally(function() {
    btn.disabled = false;
    btn.textContent = 'send message';
  });
});

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 2500);
}
</script>


<footer>© Ryan Ho™ <span id="yr"></span> · All rights reserved</footer>
<script>document.getElementById('yr').textContent = new Date().getFullYear();</script>

</body>
</html>
