<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog · Ryan Ho</title>
<link rel="icon" href="/index_files/favicon.png">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Noto+Serif+TC:wght@400;600&family=Noto+Serif+KR:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/style.css">
</head>
<body>

<nav>
  <a class="nav-logo" href="/">
    <img src="/index_files/rh_studios.png" alt="Ryan Ho">
    <span>Ryan Ho</span>
  </a>
  <ul class="nav-links">
    <li><a href="/" >Home</a></li>
    <li><a href="/blog/" class="active">Blog</a></li>
    <li><a href="/contact/" >Contact</a></li>
  </ul>
</nav>

<style>
  main { justify-content: flex-start; padding-top: 3.5rem; }

  .page-header {
    margin-bottom: 2.5rem;
    padding-bottom: 1.5rem;
    border-bottom: 2px solid var(--ink);
  }

  .page-header h1 {
    font-family: var(--mono);
    font-size: 2.5rem;
    font-weight: 500;
    margin-bottom: 0.35rem;
  }

  .page-header p {
    font-size: 0.75rem;
    color: var(--muted);
    letter-spacing: 0.08em;
  }

  .post-list {
    display: flex;
    flex-direction: column;
    gap: 1px;
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }

  .post-item {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 1rem;
    padding: 1rem 1.25rem;
    background: #fff;
    text-decoration: none;
    color: var(--ink);
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
  }
  .post-item:last-child { border-bottom: none; }
  .post-item:hover { background: var(--paper-dark); }

  .post-title {
    font-family: var(--mono);
    font-size: 1rem;
    font-weight: 500;
  }

  .post-date {
    font-size: 0.7rem;
    color: var(--muted);
    white-space: nowrap;
    letter-spacing: 0.05em;
  }

  .empty-state {
    text-align: center;
    padding: 3rem 1rem;
    color: var(--muted);
  }

  .empty-state p { font-size: 0.8rem; letter-spacing: 0.05em; }
</style>

<main style="display:block; padding: 0 2rem 4rem; max-width: 780px; margin: 0 auto; width: 100%;">
  <a class="back-link" href="/">← home</a>
  <div class="page-header">
    <h1>blog</h1>
    <p>thoughts, notes, and things worth writing down.</p>
  </div>

  
  <div class="empty-state">
    <p>no posts yet — check back soon.</p>
  </div>
  
</main>


<footer>© Ryan Ho™ <span id="yr"></span> · All rights reserved</footer>
<script>document.getElementById('yr').textContent = new Date().getFullYear();</script>

</body>
</html>
