<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ryan Ho</title>
<link rel="icon" href="index_files/favicon.png">
<meta property="og:title" content="Ryan Ho">
<meta property="og:url" content="https://www.ryanho.co/">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: #1a1410;
    --paper: #f5f0e8;
    --muted: #7a6e61;
    --mono: 'DM Mono', monospace;
    --serif: 'DM Serif Display', serif;
  }

  body {
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
  }

  .page {
    max-width: 480px;
    width: 100%;
    text-align: center;
  }

  .logo {
    width: 72px;
    height: 72px;
    object-fit: contain;
    border-radius: 50%;
    margin-bottom: 1.75rem;
  }

  h1 {
    font-family: var(--serif);
    font-size: 3rem;
    font-weight: 400;
    letter-spacing: 0.02em;
    line-height: 1;
    margin-bottom: 1rem;
  }

  .divider {
    width: 36px;
    height: 2px;
    background: var(--ink);
    margin: 0 auto 1rem;
  }

  .subtitle {
    font-family: var(--mono);
    font-size: 0.8rem;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  footer {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%);
    font-family: var(--mono);
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 0.05em;
    white-space: nowrap;
  }
</style>
</head>
<body>

<div class="page">
  <img src="index_files/rh_studios.png" alt="Ryan Ho" class="logo">
  <h1>Ryan Ho</h1>
  <div class="divider"></div>
  <p class="subtitle">New website coming soon</p>
</div>

<footer>© Ryan Ho™ <span id="yr"></span> · All rights reserved</footer>
<script>document.getElementById('yr').textContent = new Date().getFullYear();</script>

</body>
</html>
